<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chartnote FHIR Test Harness</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #30363d;
    --accent:    #58a6ff;
    --accent2:   #3fb950;
    --warn:      #f85149;
    --muted:     #8b949e;
    --text:      #e6edf3;
    --tag-epic:  #1f6feb;
    --tag-hapi:  #238636;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  header .logo span { color: var(--muted); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--warn);
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .status-dot.online { background: var(--accent2); }

  .status-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .base-url-display {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
  }

  .main {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: calc(100vh - 53px);
    overflow: hidden;
  }

  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .section {
    border-bottom: 1px solid var(--border);
  }

  .section-header {
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }

  .section-header:hover { color: var(--text); }

  .section-body {
    padding: 12px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  input, select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 7px 10px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input:focus, select:focus {
    border-color: var(--accent);
  }

  input::placeholder { color: var(--muted); }

  button {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    width: 100%;
  }

  button:active { transform: scale(0.98); }

  .btn-primary {
    background: var(--accent);
    color: #0d1117;
  }

  .btn-primary:hover { opacity: 0.85; }

  .btn-secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }

  .btn-secondary:hover { background: rgba(88,166,255,0.08); }

  .btn-danger {
    background: transparent;
    color: var(--warn);
    border: 1px solid var(--border);
    font-size: 11px;
    padding: 6px 10px;
  }

  /* Results panel */
  .results {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .results-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .results-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
  }

  .badge-ok  { background: rgba(63,185,80,0.15); color: var(--accent2); }
  .badge-err { background: rgba(248,81,73,0.15);  color: var(--warn); }
  .badge-info { background: rgba(88,166,255,0.15); color: var(--accent); }

  .results-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
  }

  .empty-state .icon {
    font-size: 32px;
    opacity: 0.3;
  }

  .empty-state p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* JSON syntax highlighting */
  .json-key    { color: #79c0ff; }
  .json-string { color: #a5d6ff; }
  .json-number { color: #f2cc60; }
  .json-bool   { color: #ff7b72; }
  .json-null   { color: var(--muted); }

  /* Result cards */
  .result-cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: var(--accent); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .card-name {
    font-weight: 600;
    font-size: 14px;
  }

  .card-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 600;
    margin-left: auto;
  }

  .tag-epic { background: rgba(31,111,235,0.2); color: #58a6ff; }
  .tag-hapi { background: rgba(35,134,54,0.2);  color: #3fb950; }

  .card-meta {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 4px 16px;
  }

  .meta-item {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .meta-item span { color: var(--text); }

  .appt-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
  }

  .appt-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .appt-status {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }

  .status-booked   { background: rgba(63,185,80,0.15);  color: var(--accent2); }
  .status-arrived  { background: rgba(88,166,255,0.15); color: var(--accent); }
  .status-cancelled{ background: rgba(248,81,73,0.15);  color: var(--warn); }
  .status-other    { background: rgba(139,148,158,0.15);color: var(--muted); }

  .loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .raw-toggle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 4px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    width: auto;
    transition: border-color 0.2s, color 0.2s;
  }
  .raw-toggle:hover { border-color: var(--accent); color: var(--accent); }

  .raw-view {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .request-url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    margin-bottom: 16px;
    word-break: break-all;
  }

  .request-url span { color: var(--accent); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">chartnote.<span>fhir</span> / test harness</div>
  <div class="status-dot" id="statusDot"></div>
  <div class="status-label" id="statusLabel">checking...</div>
  <div class="base-url-display" id="baseUrlDisplay">http://localhost:5235</div>
</header>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Config -->
    <div class="section">
      <div class="section-header">⚙ Config</div>
      <div class="section-body">
        <div class="field">
          <label>Base URL</label>
          <input id="baseUrl" value="http://localhost:5235" />
        </div>
        <div class="field">
          <label>Team ID</label>
          <input id="teamId" value="team-001" />
        </div>
      </div>
    </div>

    <!-- Patient Search -->
    <div class="section">
      <div class="section-header">🔍 Patient Search</div>
      <div class="section-body">
        <div class="field">
          <label>Family Name</label>
          <input id="searchFamily" placeholder="e.g. Powell" />
        </div>
        <div class="field">
          <label>Given Name</label>
          <input id="searchGiven" placeholder="e.g. Desiree" />
        </div>
        <div class="field">
          <label>Date of Birth</label>
          <input id="searchDob" type="date" />
        </div>
        <button class="btn-primary" onclick="searchPatients()">Search Patients</button>
      </div>
    </div>

    <!-- Patient Read -->
    <div class="section">
      <div class="section-header">👤 Patient Read</div>
      <div class="section-body">
        <div class="field">
          <label>FHIR Patient ID</label>
          <input id="patientId" placeholder="e.g. eAB3mDIBBcyUKvi..." />
        </div>
        <button class="btn-primary" onclick="getPatient()">Get Patient</button>
      </div>
    </div>

    <!-- Appointments -->
    <div class="section">
      <div class="section-header">📅 Appointments</div>
      <div class="section-body">
        <div class="field">
          <label>FHIR Patient ID</label>
          <input id="apptPatientId" placeholder="e.g. eAB3mDIBBcyUKvi..." />
        </div>
        <div class="field">
          <label>Date (optional)</label>
          <input id="apptDate" type="date" />
        </div>
        <button class="btn-primary" onclick="getAppointments()">Get Appointments</button>
      </div>
    </div>

    <!-- Encounters -->
    <div class="section">
      <div class="section-header">🏥 Encounters</div>
      <div class="section-body">
        <div class="field">
          <label>FHIR Patient ID</label>
          <input id="encPatientId" placeholder="e.g. eAB3mDIBBcyUKvi..." />
        </div>
        <button class="btn-primary" onclick="getEncounters()">Get Encounters</button>
      </div>
    </div>

    <!-- Practitioner -->
    <div class="section">
      <div class="section-header">👨‍⚕️ Practitioner Search</div>
      <div class="section-body">
        <div class="field">
          <label>Family Name</label>
          <input id="practFamily" placeholder="e.g. Smith" />
        </div>
        <div class="field">
          <label>Given Name</label>
          <input id="practGiven" placeholder="e.g. John" />
        </div>
        <button class="btn-primary" onclick="searchPractitioners()">Search Practitioners</button>
      </div>
    </div>

  </div>

  <!-- Results Panel -->
  <div class="results">
    <div class="results-header">
      <div class="results-title" id="resultsTitle">No request made yet</div>
      <button class="raw-toggle" id="rawToggle" onclick="toggleRaw()" style="display:none">RAW JSON</button>
      <div class="badge badge-info" id="resultsBadge" style="display:none"></div>
    </div>
    <div class="results-body" id="resultsBody">
      <div class="empty-state">
        <div class="icon">⚡</div>
        <p>Select an operation from the sidebar</p>
      </div>
    </div>
  </div>
</div>

<script>
  let lastRawData = null;
  let showingRaw = false;

  function getBase() { return document.getElementById('baseUrl').value.replace(/\/$/, ''); }
  function getTeam() { return document.getElementById('teamId').value; }

  // Check API health on load
  async function checkHealth() {
    const dot   = document.getElementById('statusDot');
    const label = document.getElementById('statusLabel');
    const disp  = document.getElementById('baseUrlDisplay');
    disp.textContent = getBase();
    try {
      const r = await fetch(`${getBase()}/openapi/v1.json`, { signal: AbortSignal.timeout(3000) });
      if (r.ok) {
        dot.classList.add('online');
        label.textContent = 'API online';
      } else { throw new Error(); }
    } catch {
      dot.classList.remove('online');
      label.textContent = 'API offline';
    }
  }

  document.getElementById('baseUrl').addEventListener('change', checkHealth);
  checkHealth();
  setInterval(checkHealth, 10000);

  function setLoading(url) {
    document.getElementById('resultsTitle').textContent = url;
    document.getElementById('resultsBadge').style.display = 'none';
    document.getElementById('rawToggle').style.display = 'none';
    document.getElementById('resultsBody').innerHTML =
      `<div class="loading"><div class="spinner"></div>Requesting...</div>`;
    lastRawData = null;
    showingRaw = false;
  }

  function setResult(url, data, status) {
    lastRawData = data;
    const badge = document.getElementById('resultsBadge');
    badge.style.display = '';
    badge.className = 'badge ' + (status >= 400 ? 'badge-err' : 'badge-ok');
    badge.textContent = status;
    document.getElementById('rawToggle').style.display = '';
    document.getElementById('resultsTitle').textContent = url;
  }

  function toggleRaw() {
    showingRaw = !showingRaw;
    document.getElementById('rawToggle').textContent = showingRaw ? 'FORMATTED' : 'RAW JSON';
    if (showingRaw) {
      document.getElementById('resultsBody').innerHTML =
        `<div class="raw-view"><pre>${syntaxHighlight(JSON.stringify(lastRawData, null, 2))}</pre></div>`;
    }
  }

  function syntaxHighlight(json) {
    return json
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g, m => {
        let cls = 'json-number';
        if (/^"/.test(m)) cls = /:$/.test(m) ? 'json-key' : 'json-string';
        else if (/true|false/.test(m)) cls = 'json-bool';
        else if (/null/.test(m)) cls = 'json-null';
        return `<span class="${cls}">${m}</span>`;
      });
  }

  function showError(url, msg) {
    const badge = document.getElementById('resultsBadge');
    badge.style.display = '';
    badge.className = 'badge badge-err';
    badge.textContent = 'ERROR';
    document.getElementById('resultsTitle').textContent = url;
    document.getElementById('resultsBody').innerHTML =
      `<div style="color:var(--warn);font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 0">${msg}</div>`;
  }

  function reqUrl(url) {
    return `<div class="request-url"><span>GET</span> ${url}</div>`;
  }

  // ── Patient Search ────────────────────────────────────────────────────────
  async function searchPatients() {
    const family = document.getElementById('searchFamily').value;
    const given  = document.getElementById('searchGiven').value;
    const dob    = document.getElementById('searchDob').value;

    const params = new URLSearchParams();
    if (family) params.append('family', family);
    if (given)  params.append('given',  given);
    if (dob)    params.append('birthdate', dob);

    const url = `${getBase()}/api/patient/search/${getTeam()}?${params}`;
    setLoading(url);

    try {
      const r    = await fetch(url);
      const data = await r.json();
      setResult(url, data, r.status);

      if (!r.ok) {
        document.getElementById('resultsBody').innerHTML =
          reqUrl(url) + `<div style="color:var(--warn);font-family:'JetBrains Mono',monospace;font-size:12px">${JSON.stringify(data)}</div>`;
        return;
      }

      const patients = Array.isArray(data) ? data : [data];
      renderPatientCards(url, patients);
    } catch(e) { showError(url, e.message); }
  }

  // ── Patient Read ──────────────────────────────────────────────────────────
  async function getPatient() {
    const id  = document.getElementById('patientId').value.trim();
    if (!id) return;
    const url = `${getBase()}/api/patient/${getTeam()}/${id}`;
    setLoading(url);

    try {
      const r    = await fetch(url);
      const data = await r.json();
      setResult(url, data, r.status);

      if (!r.ok) {
        document.getElementById('resultsBody').innerHTML =
          reqUrl(url) + `<div style="color:var(--warn);font-family:'JetBrains Mono',monospace;font-size:12px">${JSON.stringify(data)}</div>`;
        return;
      }

      renderPatientCards(url, [data]);
    } catch(e) { showError(url, e.message); }
  }

  // ── Appointments ──────────────────────────────────────────────────────────
  async function getAppointments() {
    const id   = document.getElementById('apptPatientId').value.trim();
    const date = document.getElementById('apptDate').value;
    if (!id) return;

    const url = date
      ? `${getBase()}/api/schedule/${getTeam()}/${id}/${date}`
      : `${getBase()}/api/schedule/${getTeam()}/${id}`;
    setLoading(url);

    try {
      const r    = await fetch(url);
      const data = await r.json();
      setResult(url, data, r.status);

      if (!r.ok) {
        document.getElementById('resultsBody').innerHTML =
          reqUrl(url) + `<div style="color:var(--warn);font-family:'JetBrains Mono',monospace;font-size:12px">${JSON.stringify(data)}</div>`;
        return;
      }

      renderAppointmentCards(url, Array.isArray(data) ? data : [data]);
    } catch(e) { showError(url, e.message); }
  }

  // ── Encounters ────────────────────────────────────────────────────────────
  async function getEncounters() {
    const id  = document.getElementById('encPatientId').value.trim();
    if (!id) return;
    const url = `${getBase()}/api/encounter/${getTeam()}/${id}`;
    setLoading(url);

    try {
      const r    = await fetch(url);
      const data = await r.json();
      setResult(url, data, r.status);

      if (!r.ok) {
        document.getElementById('resultsBody').innerHTML =
          reqUrl(url) + `<div style="color:var(--warn);font-family:'JetBrains Mono',monospace;font-size:12px">${JSON.stringify(data)}</div>`;
        return;
      }

      renderRaw(url, data);
    } catch(e) { showError(url, e.message); }
  }

  // ── Practitioner Search ───────────────────────────────────────────────────
  async function searchPractitioners() {
    const family = document.getElementById('practFamily').value;
    const given  = document.getElementById('practGiven').value;

    const params = new URLSearchParams();
    if (family) params.append('family', family);
    if (given)  params.append('given',  given);

    const url = `${getBase()}/api/practitioner/${getTeam()}/search?${params}`;
    setLoading(url);

    try {
      const r    = await fetch(url);
      const data = await r.json();
      setResult(url, data, r.status);
      renderRaw(url, data);
    } catch(e) { showError(url, e.message); }
  }

  // ── Renderers ─────────────────────────────────────────────────────────────
  function renderPatientCards(url, patients) {
    const tagClass = src => src?.toLowerCase() === 'epic' ? 'tag-epic' : 'tag-hapi';
    const html = patients.map(p => `
      <div class="card" onclick="fillPatientId('${p.fhirPatientId}')">
        <div class="card-header">
          <div class="card-name">${p.familyName}, ${p.givenName}</div>
          <div class="card-tag ${tagClass(p.ehrSource)}">${p.ehrSource || 'Unknown'}</div>
        </div>
        <div class="card-meta">
          <div class="meta-item">ID <span>${p.fhirPatientId || '—'}</span></div>
          <div class="meta-item">MRN <span>${p.mrn || '—'}</span></div>
          <div class="meta-item">DOB <span>${p.dateOfBirth || '—'}</span></div>
          <div class="meta-item">Synced <span>${p.lastSyncedAt ? new Date(p.lastSyncedAt).toLocaleTimeString() : '—'}</span></div>
        </div>
      </div>`).join('');

    document.getElementById('resultsBody').innerHTML =
      reqUrl(url) +
      `<div style="margin-bottom:10px;font-size:11px;color:var(--muted)">${patients.length} result${patients.length !== 1 ? 's' : ''} — click a card to use this patient ID</div>` +
      `<div class="result-cards">${html}</div>`;
  }

  function renderAppointmentCards(url, appts) {
    const statusClass = s => {
      if (!s) return 'status-other';
      const l = s.toLowerCase();
      if (l === 'booked') return 'status-booked';
      if (l === 'arrived') return 'status-arrived';
      if (l.includes('cancel')) return 'status-cancelled';
      return 'status-other';
    };

    const html = appts.map(a => {
      const start = a.start ? new Date(a.start) : null;
      const end   = a.end   ? new Date(a.end)   : null;
      const timeStr = start
        ? `${start.toLocaleDateString()} ${start.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}` +
          (end ? ` → ${end.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}` : '')
        : '—';
      return `
        <div class="appt-card">
          <div class="appt-time">${timeStr}</div>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
            <span class="appt-status ${statusClass(a.status)}">${a.status || 'Unknown'}</span>
            ${a.appointmentType ? `<span style="font-size:12px;color:var(--muted)">${a.appointmentType}</span>` : ''}
          </div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)">
            ID: <span style="color:var(--text)">${a.appointmentFhirId || '—'}</span>
          </div>
          ${a.patient ? `<div style="font-size:12px;margin-top:6px;color:var(--muted)">Patient: <span style="color:var(--text)">${a.patient.familyName}, ${a.patient.givenName}</span></div>` : ''}
        </div>`;
    }).join('');

    document.getElementById('resultsBody').innerHTML =
      reqUrl(url) +
      `<div style="margin-bottom:10px;font-size:11px;color:var(--muted)">${appts.length} appointment${appts.length !== 1 ? 's' : ''}</div>` +
      html;
  }

  function renderRaw(url, data) {
    document.getElementById('resultsBody').innerHTML =
      reqUrl(url) +
      `<div class="raw-view"><pre>${syntaxHighlight(JSON.stringify(data, null, 2))}</pre></div>`;
  }

  function fillPatientId(id) {
    if (!id) return;
    document.getElementById('patientId').value      = id;
    document.getElementById('apptPatientId').value  = id;
    document.getElementById('encPatientId').value   = id;
  }
</script>
</body>
</html>
